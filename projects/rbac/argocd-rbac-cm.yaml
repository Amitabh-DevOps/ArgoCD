apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  # ── Default policy for any user not explicitly mapped ─────────────────
  # Any logged-in user not listed below gets read-only access
  policy.default: role:readonly

  # ── RBAC Policies ─────────────────────────────────────────────────────
  # Format:
  #   p, <subject>, <resource>, <action>, <object>, <effect>   ← define permissions
  #   g, <user>,    <role>                                      ← assign user to role
  #
  # Project role reference format:
  #   proj:<project-name>:<role-name>
  #
  # Built-in roles:
  #   role:admin    → full access to everything in ArgoCD
  #   role:readonly → read-only access to everything

  policy.csv: |

    # ── alice → frontend-admin role ───────────────────────────────────────
    # Assigns local user 'alice' to the 'frontend-admin' role defined in team-frontend AppProject
    # That role already has: applications *, logs get — for team-frontend/* apps
    g, alice, proj:team-frontend:frontend-admin

    # ── bob → backend-admin role ──────────────────────────────────────────
    # Assigns local user 'bob' to the 'backend-admin' role defined in team-backend AppProject
    g, bob, proj:team-backend:backend-admin

    # ── What this means ───────────────────────────────────────────────────
    # alice: full access to team-frontend apps ONLY  (sync, get, delete, etc.)
    # bob:   full access to team-backend apps ONLY
    # anyone else: role:readonly (read-only, all apps)
    #
    # NOTE: When SSO is configured (future session), replace 'alice'/'bob'
    # with GitHub org team names or LDAP groups using the 'groups:' field
    # in AppProject or 'g, <group-name>, <role>' here.
