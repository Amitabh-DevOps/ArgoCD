apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  # ── Default policy for any user not explicitly mapped ─────────────────
  policy.default: role:readonly

  # ── RBAC Policies ─────────────────────────────────────────────────────
  # Format: p, <subject>, <resource>, <action>, <object>, <effect>
  #         g, <user>,    <role>
  #
  # Built-in roles:
  #   role:admin    → full access to everything in ArgoCD
  #   role:readonly → read-only access to everything

  policy.csv: |

    # ── Frontend team (alice) ─────────────────────────────────────────────
    # alice can do everything on apps inside team-frontend project
    p, alice, applications, *, team-frontend/*, allow
    p, alice, logs,         get, team-frontend/*, allow

    # ── Backend team (bob) ───────────────────────────────────────────────
    # bob can do everything on apps inside team-backend project
    p, bob, applications, *, team-backend/*, allow
    p, bob, logs,         get, team-backend/*, allow

    # alice and bob can NOT touch each other's apps
    # (no rule = deny by default)
